  /api/v1/directions/{space_id}&{poi_id}{var}/:
    get:
      operationId: directions_&_retrieve
      description: |-
        Generate a GeoJSON route between a space-id and a poi-id
        :param request: GET or POST request
        :param space_id: an integer of internal space id
        :param poi_id: an integer of internal poi-id
        :param route_type: an integer room type either 0 standard or 1 barrierefree
        :param reversed_direction: route from space-id to poi-id if true, default route from poi-id to space-id
        :return: a GeoJSON linestring of the route
      parameters:
      - in: path
        name: poi_id
        schema:
          type: string
          pattern: ^poi-id=\d{1,7}$
        required: true
      - in: path
        name: space_id
        schema:
          type: string
          pattern: ^space-id=\d{1,7}$
        required: true
      - in: path
        name: var
        schema:
          type: string
        required: true
      tags:
      - directions
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: directions_&_create
      description: |-
        Generate a GeoJSON route between a space-id and a poi-id
        :param request: GET or POST request
        :param space_id: an integer of internal space id
        :param poi_id: an integer of internal poi-id
        :param route_type: an integer room type either 0 standard or 1 barrierefree
        :param reversed_direction: route from space-id to poi-id if true, default route from poi-id to space-id
        :return: a GeoJSON linestring of the route
      parameters:
      - in: path
        name: poi_id
        schema:
          type: string
          pattern: ^poi-id=\d{1,7}$
        required: true
      - in: path
        name: space_id
        schema:
          type: string
          pattern: ^space-id=\d{1,7}$
        required: true
      - in: path
        name: var
        schema:
          type: string
        required: true
      tags:
      - directions
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/directions/{space_id}&{poi_id}{var}api/v1/directions/{space_id}&{poi_id}(&{reversed}){var}/:
    get:
      operationId: directions_&api_v1_directions_&(&)_retrieve
      description: |-
        :param request:
        :param space_id: unique space id
        :param poi_id: unique poi id
        :param reversed: boolean to set the direction of route query to allow routing
        :param route_type: 0 for normal route, 1 for barrierfree route ie no stairs


        Usage:   /api/v1/directions/space=1234&poi=456&reversed=false&type=0
      parameters:
      - in: path
        name: poi_id
        schema:
          type: string
          pattern: ^poi=\d{1,10}$
        required: true
      - in: path
        name: reversed
        schema:
          type: string
          pattern: ^reversed=(true|false)$
        required: true
      - in: path
        name: space_id
        schema:
          type: string
          pattern: ^space=\d{1,10}$
        required: true
      - in: path
        name: var
        schema:
          type: string
        required: true
      tags:
      - directions
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/directions/{space_id}&{xyz}{reversed}{route_type}/:
    get:
      operationId: directions_&_retrieve_2
      description: |-
        :param reversed_dir: boolean to set the direction of route query to allow routing
        from xyz to a space-id
        :param request:
        :param start_poi_id: unique single poi id value, integer
        :param end_xyz: end coordinate pair  x,y  ex) 1826685.08369146,6142499.125477515
        :param z_floor: integer value used to create the z value of xyz coordinate
        :param route_type: 0 for shortest route, 1 for barrierfree route ie no stairs
        :return: GeoJson route from poi id to xyz coordinate

        Usage:   /api/v1/directions/space-id=12764&xyz=1822036.251214,6140092.37464,5&reversed=false&type=0
      parameters:
      - in: path
        name: reversed
        schema:
          type: string
          pattern: ^&reversed=(true|false)$
        required: true
      - in: path
        name: route_type
        schema:
          type: string
          pattern: ^&type=\d{1}$
        required: true
      - in: path
        name: space_id
        schema:
          type: string
          pattern: ^space=\d{1,7}$
        required: true
      - in: path
        name: xyz
        schema:
          type: string
          pattern: ^xyz=[-]?\d+\.?\d+,[-]?\d+\.\d+,[-]?\d+\.\d{1}$
        required: true
      tags:
      - directions
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/directions/{start_coord},{start_floor}&{end_coord},{end_floor}&{route_type}{var}:
    get:
      operationId: directions_,&,&_retrieve
      description: |-
        Generate a GeoJSON indoor route passing in a start x,y,floor
        followed by &  then the end x,y,floor
        Sample request: http:/localhost:8000/api/v1/directions/1587848.414,5879564.080,2&1588005.547,5879736.039,2&0
        :param request:
        :param reverse_route: string  "true" or "false"
        :param start_coord: start location x,y
        :param start_floor: floor number  ex)  2
        :param end_coord: end location x,y
        :param end_floor: end floor ex)  2
        :param route_type: type of route 1 = barrier-free ex) 1
        :return: GeoJSON route
      parameters:
      - in: path
        name: end_coord
        schema:
          type: string
          pattern: ^[-]?\d+\.?\d+,\d+\.\d+$
        required: true
      - in: path
        name: end_floor
        schema:
          type: string
          pattern: ^[-]?\d+$
        required: true
      - in: path
        name: route_type
        schema:
          type: string
          pattern: ^[0-9]$
        required: true
      - in: path
        name: start_coord
        schema:
          type: string
          pattern: ^[-]?\d+\.?\d+,\d+\.\d+$
        required: true
      - in: path
        name: start_floor
        schema:
          type: string
          pattern: ^[-]?\d+$
        required: true
      - in: path
        name: var
        schema:
          type: string
        required: true
      tags:
      - directions
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: directions_,&,&_create
      description: |-
        Generate a GeoJSON indoor route passing in a start x,y,floor
        followed by &  then the end x,y,floor
        Sample request: http:/localhost:8000/api/v1/directions/1587848.414,5879564.080,2&1588005.547,5879736.039,2&0
        :param request:
        :param reverse_route: string  "true" or "false"
        :param start_coord: start location x,y
        :param start_floor: floor number  ex)  2
        :param end_coord: end location x,y
        :param end_floor: end floor ex)  2
        :param route_type: type of route 1 = barrier-free ex) 1
        :return: GeoJSON route
      parameters:
      - in: path
        name: end_coord
        schema:
          type: string
          pattern: ^[-]?\d+\.?\d+,\d+\.\d+$
        required: true
      - in: path
        name: end_floor
        schema:
          type: string
          pattern: ^[-]?\d+$
        required: true
      - in: path
        name: route_type
        schema:
          type: string
          pattern: ^[0-9]$
        required: true
      - in: path
        name: start_coord
        schema:
          type: string
          pattern: ^[-]?\d+\.?\d+,\d+\.\d+$
        required: true
      - in: path
        name: start_floor
        schema:
          type: string
          pattern: ^[-]?\d+$
        required: true
      - in: path
        name: var
        schema:
          type: string
        required: true
      tags:
      - directions
      security:
      - tokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/directions/{start_poi_id}&{end_poi_id}{route_type}/:
    get:
      operationId: directions_&_retrieve_3
      description: |-
        Sample Request URL: /directions/start-poi-id=234&end-poi-id=1122&type=0?format=json
        Optionally restricts the returned purchases to a given poi,
        by filtering against a `name` query parameter in the URL.

        :param request:
        :param start-poi-id: integer start-poi-id
        :param end-poi-id: integer end-poi-id
        :param route_type: integer 0 normal route 1 barrierer free route
        :return:
      parameters:
      - in: path
        name: end_poi_id
        schema:
          type: string
          pattern: ^end-poi-id=\d{1,7}$
        required: true
      - in: path
        name: route_type
        schema:
          type: string
          pattern: ^&type=\d{1}$
        required: true
