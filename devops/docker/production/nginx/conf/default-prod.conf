# Reject all HTTP requests to unknown hosts / bare IP
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# Reject all HTTPS requests to unknown hosts / bare IP
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/ssl/certs/campusplan.aau.at.crt;
    ssl_certificate_key /etc/ssl/private/campusplan.aau.at.key;

    return 444;
}

# Redirect HTTP → HTTPS for known hostname only
server {
    listen 80;
    server_name campusplan.aau.at;

    return 301 https://campusplan.aau.at$request_uri;
}

# Production HTTPS
server {
    listen 443 ssl;
    http2 on;

    server_name campusplan.aau.at;

    # TLS
    ssl_certificate /etc/ssl/certs/campusplan.aau.at.crt;
    ssl_certificate_key /etc/ssl/private/campusplan.aau.at.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers — repeated in child locations because nginx does not inherit
    # add_header from parent when the child also uses add_header
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    client_max_body_size 50M;

    # SPA / PWA static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        if ($args ~ "^campus=1&q=(.+)") {
            set $arg_q $1;
            rewrite ^/de/$ /?q=$arg_q? permanent;
        }

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }

    # API — Django backend
    location /api {
        proxy_pass http://indrz_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files
    location /static {
        alias /opt/data/static/;
        expires 30d;
        access_log off;

        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Django media uploads
    location /media {
        alias /opt/data/media/;
        access_log off;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Disposition "attachment";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # GeoServer
    location /geoserver {
        proxy_pass http://geoserver:8080/geoserver;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Script-Name /geoserver;
        proxy_redirect http://geoserver:8080/geoserver https://$host/geoserver;
        port_in_redirect off;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
