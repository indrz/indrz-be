server {
	listen 80;
	listen [::]:80;
server_name localhost;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # set client max upload body size to#
    client_max_body_size 50M;

    # Proxy Nuxt/Vite dev assets and HMR (WebSocket) traffic
    location /_nuxt/ {
        proxy_pass http://frontend:3000/_nuxt/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Handle Standard Frontend Traffic
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API — Django backend
    location /api {
        proxy_pass http://indrz_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files
    location /static {
        alias /opt/data/static/;
        expires 30d;
        access_log off;

        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Django media uploads
    location /media {
        alias /opt/data/media/;
        access_log off;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Disposition "attachment";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # GeoServer
    location /geoserver {
        proxy_pass http://geoserver:8080/geoserver;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Script-Name /geoserver;
        proxy_redirect http://geoserver:8080/geoserver http://$host/geoserver;
        port_in_redirect off;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

}
