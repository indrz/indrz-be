variables:
  SOURCE_BRANCH: "main"  # Branch in the source repository
  TARGET_BRANCH: "main"  # Branch in the downstream repository
  DOWNSTREAM_PROJECT_IDS: "43484495,23077745,23077517"  # aau, tu, wu project ids
  SOURCE_PROJECT_ID: 14108617  # ID of indrz/indrz-frontend repo the source repository

# Official framework image. Look for the different tagged releases at:
# https://hub.docker.com/r/library/node/tags/
image: node:latest

# This folder is cached between builds
# https://docs.gitlab.com/ee/ci/yaml/index.html#cache
cache:
  paths:
    - node_modules/

stages: [lint, build, test, build]

frontend:lint:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npx eslint . || true   # enable/disable as you prefer

ui-test-job: # This job runs in the test stage.
  stage: test # It only starts when the job in the build stage completes successfully.
  image: mcr.microsoft.com/playwright:v1.40.0-jammy
  script:
    - cat $DEV_ENV_FILE > .env
    - yarn playwright install
    - yarn pw:test
  artifacts:
    paths: #assuming deafult playwright artifacts paths
      - ./playwright-report/
      - ./Screenshot/
    when: always
    expire_in: 4 days  #artifacts will purged after 4 days of test run

frontend:test:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run test --if-present

frontend:build:
  stage: build
  image: docker:26
  services:
   - docker:26-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY"
    - docker build -f frontend/Dockerfile -t "$FRONTEND_IMAGE" -t "$FRONTEND_IMAGE_LATEST" .
    - docker push "$FRONTEND_IMAGE"
    - docker push "$FRONTEND_IMAGE_LATEST"
  needs: ["frontend:test"]